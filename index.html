<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulaire</title>
    <link rel="stylesheet" href="css/serious.css">
</head>
<body>
    <header>
        <h1 class="insc">
            INSCRIPTION
        </h1>
    </header>
    <main>

        <form action="" class="formulaire">
            
                <div>
                    <label for="nom" >
                        Nom
                    </label>
                    <input type="text" name="nom" id="nom" class="champ-nom">
                </div>
                <div>
                    <label for="prenom">
                        Prenom
                    </label>
                    <input type="text" name="prenom" id="prenom" class="champ-prenom">
                </div>
                <div>
                    <label for="email">
                        Email

                    </label>
                    <input type="email" name="email" class="champ-email" id="email">
                </div>
                <div>
                    <label for="contact">
                        Contact
                    </label>
                    <input type="number" name="contact" class="champ-contact">
                </div>

                <div>
                    <button type="submit">Soumettre</button>
                </div>
            
        </form>
    </main>
</body>
</html>
